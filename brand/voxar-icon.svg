<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="96" fill="#0A0A0F" stroke="rgba(124,58,237,0.2)" stroke-width="1.5"/>

  <!-- V-wave centered -->
  <g transform="translate(18, 62) scale(1.65)" filter="url(#glow)">
    <path d="M 5 25 L 20 25 C 26 25, 30 10, 35 10 C 38 10, 40 16, 42 22" fill="none" stroke="#F0F0F5" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M 38 14 L 47 36 C 48.5 40, 51.5 40, 53 36 L 63 14 C 65 8, 69 8, 71 14 C 73 21, 76 25, 82 25 L 95 25" fill="none" stroke="#F0F0F5" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>