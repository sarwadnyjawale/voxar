<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <linearGradient id="strokeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F0F0F5"/>
      <stop offset="100%" style="stop-color:#E0E0E8"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- VOXAR V-wave icon -->
  <g transform="translate(20, 55) scale(1.8)" filter="url(#glow)">
    <path d="M 5 25 L 20 25 C 26 25, 30 10, 35 10 C 38 10, 40 16, 42 22" fill="none" stroke="#F0F0F5" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M 38 14 L 47 36 C 48.5 40, 51.5 40, 53 36 L 63 14 C 65 8, 69 8, 71 14 C 73 21, 76 25, 82 25 L 95 25" fill="none" stroke="#F0F0F5" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Wordmark -->
  <text x="220" y="130" font-family="Inter, system-ui, -apple-system, sans-serif" font-weight="900" font-size="88" letter-spacing="-0.04em" fill="#F0F0F5">VOXAR</text>
</svg>